name: CI Builds
on:
  # Run on pushes to tags, the "master" branch, and PR's
  push:
    tags:
      - '**'
    branches:
      - master
  pull_request:

permissions:
  # This grants the GITHUB_TOKEN the necessary permissions for use with nuget.
  packages: write
  # Grant the Release step the necessary permissions to upload a release
  contents: write

jobs:
  ci:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, macos-15-intel, windows-2022]
        tb-build-type: [release]
        tb-arch: [default-arch]
        exclude:
          - os: windows-2022
            tb-arch: default-arch
        include:
          - os: macos-15-intel
            tb-build-type: sanitize
          - os: windows-2022
            tb-arch: x64
    env:
      # Record pull request head commit SHA
      TB_PULL_REQUEST_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_CACHE_KEY_PREFIX: ccache-v1
      # Set up environment variables required for caching vcpkg packages using NuGet
      # See https://learn.microsoft.com/en-us/vcpkg/consume/binary-caching-github-packages?pivots=windows-runner
      USERNAME: TrenchBroom
      VCPKG_EXE: ${{ github.workspace }}/vcpkg/vcpkg
      FEED_URL: https://nuget.pkg.github.com/TrenchBroom/index.json
      VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/TrenchBroom/index.json,readwrite"
      # Set up environment variables required for Mono (on macOS)
      # See https://formulae.brew.sh/formula/mono
      MONO_GAC_PREFIX: "$HOMEBREW_PREFIX"

    steps:
      # See: https://github.com/actions/checkout
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'recursive'

      # Install Qt
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.9.*'

      # Windows
      - name: Windows - Bootstrap vcpkg
        if: ${{ matrix.os == 'windows-2022' }}
        shell: pwsh
        run: ${{ github.workspace }}/vcpkg/bootstrap-vcpkg.bat

      - name: Windows - Install dependencies
        if: ${{ matrix.os == 'windows-2022' }}
        shell: pwsh
        run: |
          choco install ccache pandoc --yes --no-progress

          # Ensure Chocolatey shims are on PATH for subsequent steps.
          if (-not $env:ChocolateyInstall) {
            throw "ChocolateyInstall is not set"
          }
          "$env:ChocolateyInstall\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          # Fail fast if ccache still cannot be resolved.
          Get-Command ccache -ErrorAction Stop | Out-Null

          # Fail fast if pandoc still cannot be resolved.
          Get-Command pandoc -ErrorAction Stop | Out-Null

      - name: Windows - Restore ccache
        id: windows-ccache-restore
        uses: actions/cache/restore@v4
        if: ${{ matrix.os == 'windows-2022' }}
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.CCACHE_CACHE_KEY_PREFIX }}-${{ matrix.os }}-${{ matrix.tb-build-type }}-${{ matrix.tb-arch }}-${{ github.run_id }}
          restore-keys: |
            ${{ env.CCACHE_CACHE_KEY_PREFIX }}-${{ matrix.os }}-${{ matrix.tb-build-type }}-${{ matrix.tb-arch }}-
            ${{ env.CCACHE_CACHE_KEY_PREFIX }}-${{ matrix.os }}-${{ matrix.tb-build-type }}-
            ${{ env.CCACHE_CACHE_KEY_PREFIX }}-${{ matrix.os }}-

      - name: Windows - Initialize ccache
        if: ${{ matrix.os == 'windows-2022' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "$env:CCACHE_DIR" -Force | Out-Null
          ccache --set-config=max_size=1G
          ccache --zero-stats

      - name: Windows - Add NuGet sources
        if: ${{ matrix.os == 'windows-2022' }}
        shell: pwsh
        run: |
          .$(${{ env.VCPKG_EXE }} fetch nuget) `
            sources add `
            -Source "${{ env.FEED_URL }}" `
            -StorePasswordInClearText `
            -Name GitHubPackages `
            -UserName "${{ env.USERNAME }}" `
            -Password "${{ secrets.GITHUB_TOKEN }}"
          .$(${{ env.VCPKG_EXE }} fetch nuget) `
            setapikey "${{ secrets.GITHUB_TOKEN }}" `
            -Source "${{ env.FEED_URL }}"

      - name: Windows - Build
        if: ${{ matrix.os == 'windows-2022' }}
        run: cmd.exe /c CI-windows.bat

      - name: Windows - ccache stats
        if: ${{ always() && matrix.os == 'windows-2022' }}
        shell: pwsh
        run: ccache --show-stats

      - name: Windows - Save ccache
        uses: actions/cache/save@v4
        if: ${{ success() && matrix.os == 'windows-2022' && github.ref == 'refs/heads/master' }}
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.CCACHE_CACHE_KEY_PREFIX }}-${{ matrix.os }}-${{ matrix.tb-build-type }}-${{ matrix.tb-arch }}-${{ github.run_id }}

      - name: Windows - Upload artifacts
        uses: actions/upload-artifact@v4
        if: ${{ matrix.os == 'windows-2022' }}
        with:
          name: ${{ matrix.os }}
          path: |
            cmakebuild/*.zip
            cmakebuild/*.zip.md5

      # Linux
      - name: Linux - Bootstrap vcpkg
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        shell: bash
        run: ${{ github.workspace }}/vcpkg/bootstrap-vcpkg.sh

      - name: Linux - Install dependencies
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        run: |
          sudo apt update
          sudo apt install gcc-13 g++-13 build-essential libxi-dev libxrandr-dev libxxf86vm-dev freeglut3-dev mesa-common-dev libgl1-mesa-dev libglu1-mesa-dev libglm-dev pandoc cmake p7zip-full ninja-build libglew-dev libfreeimage-dev libfreetype6-dev libtinyxml2-dev libassimp-dev libfuse2 mono-complete ccache

      - name: Linux - Restore ccache
        id: linux-ccache-restore
        uses: actions/cache/restore@v4
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.CCACHE_CACHE_KEY_PREFIX }}-${{ matrix.os }}-${{ matrix.tb-build-type }}-${{ matrix.tb-arch }}-${{ github.run_id }}
          restore-keys: |
            ${{ env.CCACHE_CACHE_KEY_PREFIX }}-${{ matrix.os }}-${{ matrix.tb-build-type }}-${{ matrix.tb-arch }}-
            ${{ env.CCACHE_CACHE_KEY_PREFIX }}-${{ matrix.os }}-${{ matrix.tb-build-type }}-
            ${{ env.CCACHE_CACHE_KEY_PREFIX }}-${{ matrix.os }}-

      - name: Linux - Initialize ccache
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache --set-config=max_size=1G
          ccache --zero-stats

      - name: Linux - Add NuGet sources
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        shell: bash
        run: |
          mono `${{ env.VCPKG_EXE }} fetch nuget | tail -n 1` \
            sources add \
            -Source "${{ env.FEED_URL }}" \
            -StorePasswordInClearText \
            -Name GitHubPackages \
            -UserName "${{ env.USERNAME }}" \
            -Password "${{ secrets.GITHUB_TOKEN }}"
          mono `${{ env.VCPKG_EXE }} fetch nuget | tail -n 1` \
            setapikey "${{ secrets.GITHUB_TOKEN }}" \
            -Source "${{ env.FEED_URL }}"

      - name: Linux - Set compiler version
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        run: |
          echo "CC=gcc-13" >> $GITHUB_ENV
          echo "CXX=g++-13" >> $GITHUB_ENV

      - name: Linux - Build
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        run: |
          ./CI-linux.sh

      - name: Linux - ccache stats
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        run: ccache --show-stats

      - name: Linux - Save ccache
        uses: actions/cache/save@v4
        if: ${{ success() && matrix.os == 'ubuntu-24.04' && github.ref == 'refs/heads/master' }}
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.CCACHE_CACHE_KEY_PREFIX }}-${{ matrix.os }}-${{ matrix.tb-build-type }}-${{ matrix.tb-arch }}-${{ github.run_id }}

      - name: Linux - Upload artifacts
        uses: actions/upload-artifact@v4
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        with:
          name: ${{ matrix.os }}
          path: |
            cmakebuild/*.zip
            cmakebuild/*.md5

      # macOS
      - name: macOS - Switch to Xcode 26
        if: ${{ startsWith(matrix.os, 'macos') }}
        run: sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer

      - name: macOS - Bootstrap vcpkg
        if: ${{ startsWith(matrix.os, 'macos') }}
        shell: bash
        run: ${{ github.workspace }}/vcpkg/bootstrap-vcpkg.sh

      - name: macOS - Set up signing environment
        if: ${{ startsWith(matrix.os, 'macos') }}
        run: |
            if [[ "${{ matrix.tb-build-type }}" == "sanitize" ]]; then
              echo "TB_ENABLE_ASAN=1" >> $GITHUB_ENV
              echo "TB_ENABLE_TSAN=0" >> $GITHUB_ENV
              echo "TB_ENABLE_UBSAN=1" >> $GITHUB_ENV
            else
              echo "TB_ENABLE_ASAN=0" >> $GITHUB_ENV
              echo "TB_ENABLE_TSAN=0" >> $GITHUB_ENV
              echo "TB_ENABLE_UBSAN=0" >> $GITHUB_ENV
            fi
            if [[ "${{ matrix.tb-build-type }}" != "sanitize" ]] && 
               [[ -n "${{ secrets.ACTIONS_MAC_SIGN_CERTIFICATES_P12 }}" ]] && 
               [[ -n "${{ secrets.ACTIONS_MAC_SIGN_CERTIFICATES_P12_PASSWORD }}" ]] && 
               [[ -n "${{ secrets.ACTIONS_MAC_SIGN_IDENTITY }}" ]] &&
               [[ -n "${{ secrets.ACTIONS_MAC_NOTARIZATION_EMAIL }}" ]] &&
               [[ -n "${{ secrets.ACTIONS_MAC_NOTARIZATION_TEAM_ID }}" ]] &&
               [[ -n "${{ secrets.ACTIONS_MAC_NOTARIZATION_PASSWORD }}" ]]; then
              echo "TB_SIGN_MAC_BUNDLE=true" >> $GITHUB_ENV
              echo "TB_SIGN_IDENTITY=${{ secrets.ACTIONS_MAC_SIGN_IDENTITY }}" >> $GITHUB_ENV
              echo "TB_NOTARIZATION_EMAIL=${{ secrets.ACTIONS_MAC_NOTARIZATION_EMAIL }}" >> $GITHUB_ENV
              echo "TB_NOTARIZATION_TEAM_ID=${{ secrets.ACTIONS_MAC_NOTARIZATION_TEAM_ID }}" >> $GITHUB_ENV
              echo "TB_NOTARIZATION_PASSWORD=${{ secrets.ACTIONS_MAC_NOTARIZATION_PASSWORD }}" >> $GITHUB_ENV
            else
              echo "TB_SIGN_MAC_BUNDLE=false" >> $GITHUB_ENV
            fi

      - name: macOS - Install dependencies
        if: ${{ startsWith(matrix.os, 'macos') }}
        run: brew install p7zip pandoc ninja autoconf automake mono ccache

      - name: macOS - Import signing certificates
        if: ${{ env.TB_SIGN_MAC_BUNDLE == 'true' }}
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.ACTIONS_MAC_SIGN_CERTIFICATES_P12 }}
          p12-password: ${{ secrets.ACTIONS_MAC_SIGN_CERTIFICATES_P12_PASSWORD }}

      - name: macOS - Restore ccache
        id: macos-ccache-restore
        uses: actions/cache/restore@v4
        if: ${{ startsWith(matrix.os, 'macos') }}
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.CCACHE_CACHE_KEY_PREFIX }}-${{ matrix.os }}-${{ matrix.tb-build-type }}-${{ matrix.tb-arch }}-${{ github.run_id }}
          restore-keys: |
            ${{ env.CCACHE_CACHE_KEY_PREFIX }}-${{ matrix.os }}-${{ matrix.tb-build-type }}-${{ matrix.tb-arch }}-
            ${{ env.CCACHE_CACHE_KEY_PREFIX }}-${{ matrix.os }}-${{ matrix.tb-build-type }}-
            ${{ env.CCACHE_CACHE_KEY_PREFIX }}-${{ matrix.os }}-

      - name: macOS - Initialize ccache
        if: ${{ startsWith(matrix.os, 'macos') }}
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache --set-config=max_size=1G
          ccache --zero-stats

      - name: macOS - Add NuGet sources
        if: ${{ startsWith(matrix.os, 'macos') }}
        shell: bash
        run: |
          mono `${{ env.VCPKG_EXE }} fetch nuget | tail -n 1` \
            sources add \
            -Source "${{ env.FEED_URL }}" \
            -StorePasswordInClearText \
            -Name GitHubPackages \
            -UserName "${{ env.USERNAME }}" \
            -Password "${{ secrets.GITHUB_TOKEN }}"
          mono `${{ env.VCPKG_EXE }} fetch nuget | tail -n 1` \
            setapikey "${{ secrets.GITHUB_TOKEN }}" \
            -Source "${{ env.FEED_URL }}"

      - name: macOS - Build
        if: ${{ startsWith(matrix.os, 'macos') }}
        run: ./CI-macos.sh

      - name: macOS - ccache stats
        if: ${{ startsWith(matrix.os, 'macos') }}
        run: ccache --show-stats

      - name: macOS - Save ccache
        uses: actions/cache/save@v4
        if: ${{ success() && startsWith(matrix.os, 'macos') && github.ref == 'refs/heads/master' }}
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.CCACHE_CACHE_KEY_PREFIX }}-${{ matrix.os }}-${{ matrix.tb-build-type }}-${{ matrix.tb-arch }}-${{ github.run_id }}

      - name: macOS - Upload artifacts
        uses: actions/upload-artifact@v4
        if: ${{ startsWith(matrix.os, 'macos') && matrix.tb-build-type != 'sanitize' }}
        with:
          name: ${{ matrix.os }}
          path: |
            cmakebuild/*.zip
            cmakebuild/*.md5

      # Create release

      # Official action upload-release-asset doesn't support uploading files
      # based on a glob, so use https://github.com/softprops/action-gh-release
      - name: Release
        uses: softprops/action-gh-release@v1
        if: ${{ startsWith(github.ref, 'refs/tags/') && matrix.tb-build-type != 'sanitize' }}
        with:
          draft: true
          files: |
            cmakebuild/*.zip
            cmakebuild/*.zip.md5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload compiled manual
        uses: peaceiris/actions-gh-pages@v3
        if: ${{ startsWith(github.ref, 'refs/tags/') && matrix.os == 'ubuntu-24.04' }}
        with:
          # I've created a SSH key pair following https://github.com/peaceiris/actions-gh-pages#%EF%B8%8F-create-ssh-deploy-key
          # The TrenchBroom/TrenchBroom repo has a repository secret ACTIONS_DEPLOY_KEY set to the SSH private key
          # The TrenchBroom/manual repo has a deploy key set to the SSH public key
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          external_repository: TrenchBroom/manual # Repo to deploy to
          publish_branch: gh-pages # Branch to deploy to
          publish_dir: ./cmakebuild/app/TrenchBroom/gen-manual # Source directory tree
          destination_dir: latest # Deploy to this directory in target repo
